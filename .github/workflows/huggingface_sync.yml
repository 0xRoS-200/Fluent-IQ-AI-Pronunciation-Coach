name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "=== ERROR: HF_TOKEN or HF_SPACE_NAME secret is not configured in GitHub repository settings. ==="
            exit 1
          fi
          # Force push main branch to Hugging Face Space repository
          git push --force https://x-access-token:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_NAME main
